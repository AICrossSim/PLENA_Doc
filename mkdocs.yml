site_name: PLENA Documentation
site_description: Documentation for PLENA - A Programmable Long-context Efficient Neural Accelerator
site_author: PLENA Team
site_url: https://AICrossSim.github.io/PLENA_Doc/
repo_url: https://github.com/AICrossSim/PLENA_Doc
repo_name: AICrossSim/PLENA_Doc

docs_dir: doc
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
  logo: plena_logo.png
  favicon: plena_logo.png

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - PLENA System Toolchain: plena_system_toolchain.md
  - Hardware Configuration: hardware_config.md
  - ISA Specification: isa_spec.md
  - Memory Layout: memory_layout.md
  - API Reference:
      - Interface Module: api/interface.md
      - Search Module: api/search.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AICrossSim/PLENA_Doc
